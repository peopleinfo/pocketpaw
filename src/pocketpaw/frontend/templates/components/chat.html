<!--
  PocketPaw Dashboard - Chat Component

  Changes (2026-02-12):
  - Fixed double bottom padding → flex-based input (no spacer hack)
  - Input area: gradient fade, aligned with messages, safe-area-inset
  - Agent toggle moved inside input pill
  - Reduced message gap (gap-6 → gap-2.5)
  - Responsive top padding (pt-16 md:pt-20)
  - Animation only on new messages (not session history)
  - Accessibility: aria-labels on input and toggle
  - Streaming indicator: min-height for stable sizing

  Changes (2026-02-03):
  - Extracted from monolithic index.html
  - Added responsive message widths: max-w-[85%] mobile, max-w-[70%] desktop
  - Responsive padding and font sizes
  - Fixed input area positioning for mobile
-->
<!-- Chat View -->
<!-- Added explicit min-height-0 to allow flex child to shrink properly -->
<div
  class="flex-1 flex flex-col pt-16 md:pt-20 overflow-hidden min-h-0"
  x-show="view === 'chat'"
  x-data="{ apiBannerDismissed: false }"
>
  <!-- Onboarding Banner for Missing API Key -->
  <template
    x-if="
      !apiBannerDismissed &&
      (
        isBackendUnconfigured() ||
        (healthIssues && healthIssues.some(i =>
          i.check_id === 'api_key_primary' &&
          (i.status === 'critical' || i.status === 'warning')
        ))
      )
    "
  >
    <div
      class="mx-4 md:mx-8 mt-2 px-4 py-3 bg-amber-500/10 border border-amber-500/20 rounded-xl flex items-center justify-between gap-4"
    >
      <div class="flex items-center gap-3 text-amber-200/90">
        <svg class="w-5 h-5 shrink-0 text-amber-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
        <p class="text-[13px] md:text-sm font-medium leading-tight">
          PocketPaw is running! To enable AI features, add an API key in
          <span class="text-amber-400 font-bold">Settings</span>.
        </p>
      </div>
      <div class="flex items-center gap-2">
        <button
          @click="openSettings(); sidebarOpen = false"
          class="px-3 py-1.5 bg-amber-500/20 hover:bg-amber-500/30 text-amber-200 text-xs font-semibold rounded-lg transition-colors whitespace-nowrap"
        >
          Open Settings
        </button>
        <button
          @click="apiBannerDismissed = true"
          class="p-1 hover:bg-white/5 rounded-full text-amber-200/40 hover:text-amber-200/80 transition-colors"
        >
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
    </div>
  </template>

  <div
    class="messages flex-1 flex flex-col gap-2.5 overflow-y-auto p-4 md:p-8 pb-8 min-h-0"
    x-ref="messages"
  >
    <template x-for="(msg, index) in messages" :key="index">
      <!-- Message Item -->
      <div
        class="flex flex-col gap-1 max-w-[85%] md:max-w-[70%] min-w-0"
        :class="[msg.role === 'user' ? 'self-end items-end' : 'self-start items-start', msg.isNew === true ? 'animate-[messageSlide_0.3s_ease-out]' : '']"
      >
        <div
          class="px-4 py-3 md:px-5 md:py-3.5 rounded-2xl text-[14px] md:text-[15px] leading-relaxed shadow-sm relative break-words max-w-full message-content-wrapper"
          :class="msg.role === 'user' ? 'bg-[var(--accent-color)] text-white rounded-br-sm' : 'bg-[var(--card-bg)] border border-[var(--glass-border)] rounded-bl-sm'"
          x-html="formatMessage(msg.content)"
        ></div>
        <div
          class="flex gap-2 items-center px-1 opacity-70"
          :class="msg.role === 'user' ? 'flex-row-reverse' : ''"
        >
          <span
            class="text-[11px] md:text-xs font-semibold text-[var(--text-secondary)]"
            x-text="msg.role === 'user' ? '' : 'PocketPaw'"
            x-show="msg.role !== 'user'"
          ></span>
          <span
            class="text-[10px] md:text-[11px] text-[var(--text-tertiary)]"
            x-text="msg.time"
          ></span>
        </div>
      </div>
    </template>

    <!-- Streaming indicator -->
    <div
      class="flex flex-col gap-1 max-w-[85%] md:max-w-[70%] min-w-0 self-start items-start"
      x-show="isStreaming"
    >
      <div
        class="px-4 py-3 md:px-5 md:py-3.5 rounded-2xl text-[14px] md:text-[15px] leading-relaxed shadow-sm relative max-w-full bg-[var(--card-bg)] border border-[var(--glass-border)] rounded-bl-sm message-content-wrapper min-h-[44px]"
      >
        <span
          x-show="streamingContent"
          x-html="formatMessage(streamingContent)"
        ></span>
        <span
          x-show="!streamingContent && isThinking"
          class="text-white/40 italic"
        >
          <span
            x-show="thinkingContextLine"
            class="block text-[11px] md:text-xs not-italic text-white/50 mb-1"
            x-text="thinkingContextLine"
          ></span>
          Thinking<span class="animate-pulse">...</span>
        </span>
        <span x-show="!streamingContent && !isThinking" class="text-white/40">
          Preparing response...
        </span>
        <span class="animate-pulse font-bold" aria-label="Streaming in progress">▌</span>
      </div>
      <div class="flex gap-2 items-center px-1 opacity-70">
        <span
          class="text-[11px] md:text-xs font-semibold text-[var(--text-secondary)]"
          >PocketPaw</span
        >
        <span
          class="text-[10px] md:text-[11px] text-[var(--text-tertiary)]"
          x-text="currentTime()"
        ></span>
      </div>
    </div>
  </div>

  <!-- Input Area — flex child, gradient fade, safe-area inset -->
  <div class="shrink-0 relative z-20">
    <div class="absolute inset-x-0 -top-8 h-8 bg-gradient-to-t from-black to-transparent pointer-events-none"></div>
    <div class="bg-black px-3 md:px-8 pb-2 md:pb-4 pt-1" style="padding-bottom: max(0.5rem, env(safe-area-inset-bottom))" @click.outside="showComposerHelp = false">
      <div
        class="mb-2 rounded-2xl border border-[var(--glass-border)] bg-[#1f1f21]/95 px-3 py-2 md:px-4 md:py-3"
        x-show="showComposerHelp || inputText.trim().startsWith('/')"
        x-transition.opacity.duration.150ms
        x-data="{ shortcutsTab: 'commands' }"
      >
        <!-- Header row: title + tab switcher + shortcut hint -->
        <div class="flex items-center justify-between gap-2 flex-wrap">
          <div class="flex items-center gap-1.5">
            <p class="text-[11px] md:text-xs font-semibold uppercase tracking-wide text-white/65">Quick Shortcuts</p>
            <!-- Tab switcher -->
            <div class="flex items-center gap-0.5 ml-2 rounded-lg bg-white/5 p-0.5">
              <button
                type="button"
                @click="shortcutsTab = 'commands'"
                :class="shortcutsTab === 'commands' ? 'bg-white/15 text-white' : 'text-white/45 hover:text-white/65'"
                class="rounded-md px-2 py-0.5 text-[10px] md:text-[11px] font-medium transition-all"
              >Commands</button>
              <button
                type="button"
                @click="shortcutsTab = 'mcp'; refreshShortcutsMCP && refreshShortcutsMCP()"
                :class="shortcutsTab === 'mcp' ? 'bg-white/15 text-white' : 'text-white/45 hover:text-white/65'"
                class="rounded-md px-2 py-0.5 text-[10px] md:text-[11px] font-medium transition-all flex items-center gap-1"
              >
                MCP
                <span
                  x-show="connectedMCPCount && connectedMCPCount() > 0"
                  x-text="connectedMCPCount && connectedMCPCount()"
                  class="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-[var(--accent-color)] text-white text-[9px] font-bold leading-none"
                ></span>
              </button>
              <button
                type="button"
                @click="shortcutsTab = 'skills'"
                :class="shortcutsTab === 'skills' ? 'bg-white/15 text-white' : 'text-white/45 hover:text-white/65'"
                class="rounded-md px-2 py-0.5 text-[10px] md:text-[11px] font-medium transition-all flex items-center gap-1"
              >
                Skills
                <span
                  x-show="skills && skills.length > 0"
                  x-text="skills && skills.length"
                  class="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-purple-500 text-white text-[9px] font-bold leading-none"
                ></span>
              </button>
            </div>
          </div>
          <p class="text-[10px] md:text-[11px] text-white/45">Ctrl/Cmd + /</p>
        </div>

        <!-- Commands tab -->
        <div x-show="shortcutsTab === 'commands'" x-transition.opacity.duration.100ms>
          <div class="mt-2 grid grid-cols-1 md:grid-cols-2 gap-2">
            <template x-for="item in getVisibleQuickCommands()" :key="item.command">
              <button
                type="button"
                @click="insertQuickCommand(item.command)"
                class="text-left rounded-xl border border-white/10 bg-white/5 px-3 py-2 hover:bg-white/10 transition-colors"
              >
                <p class="text-[12px] md:text-[13px] font-mono text-[var(--accent-color)]" x-text="item.command"></p>
                <p class="text-[11px] md:text-xs text-white/60 mt-0.5" x-text="item.description"></p>
              </button>
            </template>
          </div>
          <div class="mt-2 flex flex-wrap gap-1.5 text-[10px] md:text-[11px] text-white/45">
            <span class="rounded-md bg-white/5 px-2 py-1">Ctrl/Cmd+N New Chat</span>
            <span class="rounded-md bg-white/5 px-2 py-1">Ctrl/Cmd+K Search</span>
            <span class="rounded-md bg-white/5 px-2 py-1">Ctrl/Cmd+, Settings</span>
          </div>
        </div>

        <!-- MCP tab -->
        <div x-show="shortcutsTab === 'mcp'" x-transition.opacity.duration.100ms>
          <template x-if="getShortcutsMCPServers().length === 0">
            <div class="mt-2 flex flex-col items-center justify-center py-4 text-center gap-1.5">
              <i data-lucide="plug-zap" class="w-5 h-5 text-white/20"></i>
              <p class="text-[11px] md:text-xs text-white/35">No MCP servers connected.</p>
              <button
                type="button"
                @click="showComposerHelp = false; openMCP && openMCP()"
                class="mt-1 text-[10px] md:text-[11px] text-[var(--accent-color)] hover:underline"
              >Open MCP Manager →</button>
            </div>
          </template>
          <template x-if="getShortcutsMCPServers().length > 0">
            <div>
              <p class="mt-2 text-[10px] md:text-[11px] text-white/35 mb-1.5">Click a server to start a prompt with it.</p>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-44 overflow-y-auto pr-0.5">
                <template x-for="srv in getShortcutsMCPServers()" :key="srv.name">
                  <button
                    type="button"
                    @click="insertMCPServerPrompt(srv.name)"
                    class="text-left rounded-xl border border-white/10 bg-white/5 px-3 py-2 hover:bg-white/10 hover:border-[var(--accent-color)]/30 transition-colors group"
                  >
                    <div class="flex items-center justify-between gap-2">
                      <div class="flex items-center gap-1.5 min-w-0">
                        <!-- connected dot -->
                        <span class="w-1.5 h-1.5 rounded-full shrink-0" :class="srv.connected ? 'bg-green-400' : 'bg-white/20'"></span>
                        <p class="text-[12px] md:text-[13px] font-mono text-[var(--accent-color)] truncate group-hover:text-white transition-colors" x-text="srv.name"></p>
                      </div>
                      <!-- tool count badge -->
                      <template x-if="srv.tools && srv.tools.length">
                        <span
                          class="shrink-0 inline-flex items-center gap-0.5 rounded-md bg-white/8 px-1.5 py-0.5 text-[9px] md:text-[10px] text-white/50"
                        >
                          <i data-lucide="wrench" class="w-2.5 h-2.5"></i>
                          <span x-text="srv.tools.length"></span>
                        </span>
                      </template>
                    </div>
                    <p class="text-[10px] md:text-[11px] text-white/45 mt-0.5 truncate" x-text="getMCPServerToolNames(srv)"></p>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Skills tab -->
        <div x-show="shortcutsTab === 'skills'" x-transition.opacity.duration.100ms>
          <template x-if="!skills || skills.length === 0">
            <div class="mt-2 flex flex-col items-center justify-center py-4 text-center gap-1.5">
              <i data-lucide="puzzle" class="w-5 h-5 text-white/20"></i>
              <p class="text-[11px] md:text-xs text-white/35">No skills installed.</p>
              <button
                type="button"
                @click="showComposerHelp = false; openSkills && openSkills()"
                class="mt-1 text-[10px] md:text-[11px] text-purple-400 hover:underline"
              >Browse Skills →</button>
            </div>
          </template>
          <template x-if="skills && skills.length > 0">
            <div>
              <p class="mt-2 text-[10px] md:text-[11px] text-white/35 mb-1.5">Click a skill to insert its command.</p>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-44 overflow-y-auto pr-0.5">
                <template x-for="skill in skills" :key="skill.name">
                  <button
                    type="button"
                    @click="insertQuickSkill(skill)"
                    class="text-left rounded-xl border border-white/10 bg-white/5 px-3 py-2 hover:bg-white/10 hover:border-purple-500/30 transition-colors group"
                  >
                    <div class="flex items-center gap-1.5 min-w-0">
                      <i data-lucide="zap" class="w-3 h-3 shrink-0 text-purple-400/70 group-hover:text-purple-400 transition-colors"></i>
                      <p class="text-[12px] md:text-[13px] font-mono text-purple-300 truncate" x-text="'/' + skill.name"></p>
                    </div>
                    <p class="text-[10px] md:text-[11px] text-white/45 mt-0.5 line-clamp-1" x-text="skill.description || 'Run this skill'"></p>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Skill usage hint (shown on any tab when typing /<skill>) -->
        <div
          x-show="shouldShowSkillHint()"
          x-transition.opacity.duration.120ms
          class="mt-3 rounded-xl border border-white/10 bg-black/25 px-3 py-2.5"
        >
          <p class="text-[10px] md:text-[11px] uppercase tracking-wide text-white/45">Skill Usage</p>
          <p class="mt-1 text-[12px] md:text-[13px] font-mono text-[var(--accent-color)] break-all" x-text="getActiveSkillUsage()"></p>
          <p
            x-show="getActiveSkillExample()"
            class="mt-1 text-[11px] md:text-xs text-white/55 break-all"
          >
            Example:
            <span class="font-mono text-white/70" x-text="getActiveSkillExample()"></span>
          </p>
          <p
            x-show="activeSkillNeedsArgs() && !activeSkillHasArgs()"
            class="mt-1 text-[11px] md:text-xs text-amber-300/90"
          >
            Required arguments missing.
          </p>
        </div>
      </div>
      <form
        class="relative flex items-center bg-[#2c2c2e]/90 backdrop-blur-xl border border-[var(--glass-border)] rounded-[24px] shadow-2xl transition-all focus-within:ring-1 focus-within:ring-white/20 focus-within:bg-[#323234]"
        @submit.prevent="sendMessage()"
      >
        <!-- Agent Mode Toggle (inside pill) -->
        <label class="relative w-[36px] h-[20px] cursor-pointer ml-4 shrink-0" aria-label="Agent mode">
          <input
            type="checkbox"
            x-model="agentActive"
            @change="toggleAgent()"
            class="absolute opacity-0 w-0 h-0 peer"
          />
          <span
            class="absolute inset-0 bg-[#787880]/30 rounded-full transition-colors duration-300 peer-checked:bg-[var(--success-color)]"
          ></span>
          <span
            class="absolute left-0.5 top-0.5 w-[16px] h-[16px] bg-white rounded-full shadow-[0_1px_3px_rgba(0,0,0,0.2)] transition-transform duration-300 peer-checked:translate-x-[16px]"
          ></span>
        </label>
        <div class="w-px h-5 bg-white/10 mx-2 shrink-0"></div>
        <button
          type="button"
          @click="toggleComposerHelp()"
          class="shrink-0 w-7 h-7 rounded-full bg-white/5 hover:bg-white/12 text-white/70 hover:text-white transition-colors flex items-center justify-center"
          aria-label="Toggle quick shortcuts"
          title="Shortcuts (Ctrl/Cmd+/)"
        >
          <i data-lucide="help-circle" class="w-4 h-4"></i>
        </button>

        <input
          type="text"
          class="flex-1 bg-transparent border-none text-[15px] text-white placeholder-white/30 py-4 pr-14 focus:outline-none focus:ring-0"
          placeholder="Type a message..."
          x-model="inputText"
          x-ref="chatInput"
          @keydown="handleComposerKeydown($event)"
          :disabled="isStreaming"
          aria-label="Chat message input"
        />
        <!-- Send button (hidden during streaming) -->
        <button
          x-show="!isStreaming"
          type="submit"
          class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 md:w-9 md:h-9 bg-[var(--accent-color)] hover:bg-[var(--accent-hover)] text-white rounded-full flex items-center justify-center transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg hover:shadow-[0_0_15px_rgba(10,132,255,0.4)] hover:scale-105 active:scale-95"
          :disabled="!canSubmitInput()"
          aria-label="Send message"
        >
          <i data-lucide="arrow-up" class="w-4 h-4 md:w-5 md:h-5"></i>
        </button>
        <!-- Stop button (shown during streaming) -->
        <button
          x-show="isStreaming"
          type="button"
          @click="stopResponse()"
          :disabled="isStopRequested"
          class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 md:w-9 md:h-9 bg-red-600 hover:bg-red-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
          aria-label="Stop response"
        >
          <i data-lucide="square" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
        </button>
      </form>
    </div>
  </div>
</div>
